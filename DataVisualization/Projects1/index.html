<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>冬奥会奖牌数据可视化</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="bg-mesh" aria-hidden="true"></div>
  <div class="page">
    <header>
      <h1>冬奥会奖牌榜数据可视化</h1>
      <p>基于 CSV 实验数据 · ECharts 图表 · 响应式布局</p>
    </header>

    <div id="load-error" class="error-banner" role="alert"></div>

    <section class="stats" aria-label="数据概览">
      <div class="stat-card gold">
        <span>金牌合计（前 10 名）</span>
        <strong id="sum-gold">—</strong>
      </div>
      <div class="stat-card silver">
        <span>银牌合计（前 10 名）</span>
        <strong id="sum-silver">—</strong>
      </div>
      <div class="stat-card bronze">
        <span>铜牌合计（前 10 名）</span>
        <strong id="sum-bronze">—</strong>
      </div>
      <div class="stat-card total">
        <span>参与国家/地区</span>
        <strong id="country-count">—</strong>
      </div>
    </section>

    <div class="charts">
      <article class="chart-panel wide">
        <h2>各国金 / 银 / 铜奖牌分布（前 10 名）— 堆叠柱状图</h2>
        <div id="chart-stacked" class="chart" role="img" aria-label="堆叠柱状图"></div>
      </article>
      <article class="chart-panel">
        <h2>奖牌总数占比（前 8 名）— 饼图</h2>
        <div id="chart-pie" class="chart" role="img" aria-label="饼图"></div>
      </article>
      <article class="chart-panel">
        <h2>各国奖牌总数排行（前 12 名）— 横向条形图</h2>
        <div id="chart-bar" class="chart" role="img" aria-label="条形图"></div>
      </article>
    </div>

    <footer>
      数据来源：medals_countries.csv
    </footer>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
